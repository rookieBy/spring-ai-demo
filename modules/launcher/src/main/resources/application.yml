server:
  port: 8080

spring:
  application:
    name: spring-ai-demo

  # MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/spring_ai_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # SQL Init - Auto create tables
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# MyBatis Plus Configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Spring AI Configuration
spring:
  ai:
    # DeepSeek Configuration
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-ca951e58cea0451e9d59046c01ef20bd}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    # GLM (Zhipu AI) Configuration
    alibaba:
      api-key: ${GLM_API_KEY:your-glm-api-key}
      base-url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      chat:
        options:
          model: glm-4
          temperature: 0.7

    # Qwen (Alibaba DashScope) Configuration
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7

    # OpenAI Configuration (fallback)
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.example: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
